name: Build & Push LLM Images

# -----------------------------------------------------------------------------
# Builds every model's Dockerfile and pushes the resulting images to Docker Hub.
#   * push / workflow_dispatch / schedule -> build AND push
#   * pull_request                        -> build ONLY (validates the build,
#                                            never pushes, safe for forks)
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   DOCKERHUB_USERNAME  your Docker Hub username
#   DOCKERHUB_TOKEN     a Docker Hub access token (not your password)
#   HF_TOKEN            (optional) HuggingFace token for gated models (Mistral,
#                       official Llama). Leave empty for the open defaults.
# -----------------------------------------------------------------------------

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 3 * * *" # daily at 03:00 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # one model failing must not cancel the others
      matrix:
        model:
          - gpt2
          - llama
          - mistral
          - gemma
          - phi
          - qwen
          - falcon
          - bloom
          - pythia
          - stablelm
          - opt
          - gptneo
          - deepseek
          - smollm
          - zephyr

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Large model images can exhaust the runner's disk; reclaim space first.
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android "$AGENT_TOOLSDIRECTORY"
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image metadata
        id: meta
        run: |
          echo "image=${{ secrets.DOCKERHUB_USERNAME }}/airlock-${{ matrix.model }}" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"

      # Only log in (and therefore only push) on non-PR events. PRs just build.
      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.model }}
          file: ./${{ matrix.model }}/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.date }}
            ${{ steps.meta.outputs.image }}:${{ github.sha }}
          # Passed to all builds; only the gated Dockerfiles actually mount it.
          # When HF_TOKEN is unset the secret is empty and the open defaults are
          # used (the secret mount is required=false in those Dockerfiles).
          secrets: |
            hf_token=${{ secrets.HF_TOKEN }}
          # Speed up rebuilds with a per-model GitHub Actions cache.
          cache-from: type=gha,scope=${{ matrix.model }}
          cache-to: type=gha,mode=max,scope=${{ matrix.model }}
