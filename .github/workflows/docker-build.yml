name: Build & Push LLM Images

# -----------------------------------------------------------------------------
# Builds every model's Dockerfile and pushes the resulting images to the GitHub
# Container Registry (ghcr.io).
#   * push / workflow_dispatch / schedule -> build AND push
#   * pull_request                        -> build ONLY (validates the build,
#                                            never pushes, safe for forks)
#
# Auth: uses the built-in GITHUB_TOKEN -- no personal credentials required.
# Images are published under the repo owner: ghcr.io/<owner>/airlock-<model>.
# (After the first push, set the package visibility to Public if you want it
#  pullable without auth: repo -> Packages -> the image -> Package settings.)
#
# Optional repository secret (Settings -> Secrets and variables -> Actions):
#   HF_TOKEN  HuggingFace token for gated models (Mistral, official Llama).
#             Leave unset for the open defaults.
# -----------------------------------------------------------------------------

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 3 * * *" # daily at 03:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  packages: write # required to push images to ghcr.io

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # one model failing must not cancel the others
      matrix:
        model:
          - gpt2
          - llama
          - mistral
          - gemma
          - phi
          - qwen
          - falcon
          - bloom
          - pythia
          - stablelm
          - opt
          - gptneo
          - deepseek
          - smollm
          - zephyr
          - olmo
          - glm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Large model images can exhaust the runner's disk; reclaim space first.
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android "$AGENT_TOOLSDIRECTORY"
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image metadata
        id: meta
        run: |
          # ghcr.io requires the image path to be lowercase; the owner login
          # may contain uppercase characters, so normalise it here.
          owner="${{ github.repository_owner }}"
          echo "image=ghcr.io/${owner,,}/airlock-${{ matrix.model }}" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"

      # Log in for pushes/schedules/dispatch AND for same-repo PRs, so that PR
      # builds can READ the registry cache and skip the ~15 GB re-download. Fork
      # PRs are deliberately excluded: their token is untrusted, so they simply
      # miss the cache and build from scratch. Pushing the image and writing the
      # cache are gated separately below (`push` and `cache-to`), so no PR -- not
      # even a same-repo one -- ever publishes anything.
      - name: Log in to GitHub Container Registry
        if: >-
          github.event_name != 'pull_request' ||
          github.event.pull_request.head.repo.full_name == github.repository
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.model }}
          file: ./${{ matrix.model }}/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.date }}
            ${{ steps.meta.outputs.image }}:${{ github.sha }}
          # Passed to all builds; only the gated Dockerfiles actually mount it.
          # When HF_TOKEN is unset the secret is empty and the open defaults are
          # used (the secret mount is required=false in those Dockerfiles).
          secrets: |
            hf_token=${{ secrets.HF_TOKEN }}
          # Speed up rebuilds with a per-model REGISTRY cache stored alongside the
          # image as a ":buildcache" tag in ghcr.io. We use the registry (not
          # type=gha) on purpose: the GitHub Actions cache is capped at 10 GB per
          # repo, so the ~15 GB weight layer of the 7B models (mistral, zephyr)
          # never fits and is re-downloaded from HuggingFace every run. The
          # registry has no such cap, so the `RUN python download_model.py` layer
          # is reused as long as requirements.txt, download_model.py and MODEL_ID
          # are unchanged -- no 15 GB re-pull.
          #
          # cache-from runs on every event (it is a no-op miss if the cache tag
          # is unreadable, e.g. on fork PRs). cache-to only runs when we are
          # logged in and pushing (non-PR events); on PRs it is an empty string,
          # which build-push-action treats as "no cache export".
          cache-from: type=registry,ref=${{ steps.meta.outputs.image }}:buildcache
          cache-to: ${{ github.event_name != 'pull_request' && format('type=registry,ref={0}:buildcache,mode=max,image-manifest=true,oci-mediatypes=true', steps.meta.outputs.image) || '' }}
